name: Arbor
options:
  bundleIdPrefix: com.kkawahara
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  Arbor:
    type: application
    platform: macOS
    sources:
      - Arbor
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kkawahara.Arbor
        GENERATE_INFOPLIST_FILE: YES
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "2"
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: Arbor/Resources/Arbor.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES

  ArborTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - ArborTests
    dependencies:
      - target: Arbor
    settings:
      base:
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_USER_SCRIPT_SANDBOXING: NO
